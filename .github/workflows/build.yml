name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install vendor source dependencies
        run: cd vendor-src && pnpm install

      - name: Build vendor bundles
        run: pnpm prebuild:vendor

      - name: Copy esbuild WASM
        run: cp node_modules/esbuild-wasm/esbuild.wasm public/esbuild.wasm

      # Linux dependencies for Tauri
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # On tag pushes: build + create draft release
      - name: Build and release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Atelier v__VERSION__'
          releaseBody: |
            ## Atelier v__VERSION__

            Desktop viewer for Claude artifacts. Download the installer for your platform below.

            **Windows:** `.msi` or `-setup.exe` (NSIS)
            **macOS:** `.dmg`
            **Linux:** `.deb` or `.AppImage`
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      # On branch pushes/PRs: build and upload artifacts
      - name: Build only
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Upload build artifacts (Windows)
        if: "!startsWith(github.ref, 'refs/tags/v') && matrix.platform == 'windows-latest'"
        uses: actions/upload-artifact@v4
        with:
          name: atelier-windows-x64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi

      - name: Upload build artifacts (macOS)
        if: "!startsWith(github.ref, 'refs/tags/v') && matrix.platform == 'macos-latest'"
        uses: actions/upload-artifact@v4
        with:
          name: atelier-macos-arm64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload build artifacts (Linux)
        if: "!startsWith(github.ref, 'refs/tags/v') && matrix.platform == 'ubuntu-22.04'"
        uses: actions/upload-artifact@v4
        with:
          name: atelier-linux-x64
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
